name: Sync match data

on:
  schedule:
    # Backstop only — the app's lazy sync keeps data fresh while anyone is
    # watching. Restricted to the active window (05:00–18:00 AEST = 19:00–07:59
    # UTC) so the Neon database can autosuspend overnight, when no games are
    # played and scores cannot change. Fixed to AEST = UTC+10, which holds for
    # all of WC 2026 (no DST); revisit if reused outside the tournament.
    - cron: "*/30 19-23,0-7 * * *"
  workflow_dispatch:

jobs:
  ping-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger sync endpoint
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.SYNC_URL }}"
